    <style>
   /* FONT */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
}

/* MAIN */
.main-container {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 40%;
    padding: 20px;
    overflow-y: auto;
    background: #020617;
}

/* GRID - DASHBOARD STYLE */
#btn-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

/* CARD */
.exp-btn {
    border-radius: 18px;
    border: none;
    cursor: pointer;
    padding: 20px;
    text-align: left;
    color: white;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
}

/* RANDOM BIG CARDS */
.exp-btn:nth-child(3n) {
    grid-column: span 2;
}

/* GLOW BORDER */
.exp-btn::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 18px;
    padding: 1px;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}

/* HOVER */
.exp-btn:hover {
    transform: translateY(-8px) scale(1.02);
    background: linear-gradient(135deg, #6366f1, #38bdf8);
}

/* ACTIVE */
.exp-btn.active {
    background: linear-gradient(135deg, #22c55e, #16a34a);
}

/* TEXT */
.exp-num {
    font-size: 12px;
    opacity: 0.7;
}

.exp-title-small {
    font-size: 16px;
    font-weight: 500;
    margin-top: 6px;
}

/* RIGHT PANEL */
.output-screen {
    width: 60%;
    padding: 25px;
    display: flex;
    flex-direction: column;
    background: #0f172a;
}

/* TITLE */
#exp-title {
    font-size: 22px;
    margin-bottom: 15px;
}

/* OUTPUT */
#output-display {
    flex: 1;
    border-radius: 18px;
    overflow: hidden;
    background: #ffffff;
    box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

/* iframe */
iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* SCROLLBAR */
.sidebar::-webkit-scrollbar {
    width: 6px;
}
.sidebar::-webkit-scrollbar-thumb {
    background: #334155;
    border-radius: 10px;
}

        const btnContainer = document.getElementById('btn-container');
        const display = document.getElementById('output-display');
        const titleText = document.getElementById('exp-title');

        for (let i = 1; i <= 13; i++) {
            const btn = document.createElement('button');
            btn.className = 'exp-btn';
            btn.innerHTML = `<span class="exp-num">Exp ${i}</span> <span style="font-size:13px; font-weight:500;">${experiments[i].title}</span>`;
            
            btn.onclick = function() {
                document.querySelectorAll('.exp-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                titleText.innerText = experiments[i].title;
                display.innerHTML = "";
                const iframe = document.createElement('iframe');
                display.appendChild(iframe);
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write(experiments[i].content);
                doc.close();
            };
            btnContainer.appendChild(btn);
        }
